# proofloop config for the demo todo API (examples/todo-api/server.mjs)
# Start the server first (from this directory):
#   node server.mjs > server.log 2>&1 &
#   echo $! > server.pid          # stop later with: kill $(cat server.pid)
# All run: commands execute from this file's directory (see SKILL.md contract).
# NOTE: the demo server's cleanup deletes by SUBSTRING match on the tag —
# run_ids must be collision-safe (no run_id a prefix of another).
tag: "proofloop-{run_id}"
shell: bash          # run: commands need bash (tail); on Windows use Git Bash

settle:
  timeout_seconds: 10
  poll: "curl -s localhost:3000/health"   # liveness only; settle on api_state

stimuli:
  create_todo:
    run: 'curl -s -X POST localhost:3000/todos -H "content-type: application/json" -d "{\"title\": \"{input} [{tag}]\"}"'
  complete_todo:
    run: 'curl -s -X PATCH localhost:3000/todos/{id} -H "content-type: application/json" -d "{\"done\": true}"'

evidence:
  api_state:
    run: "curl -s localhost:3000/todos"
    note: "the read API - would a user actually see the todo?"
  server_log:
    run: "tail -30 server.log"
    note: "what the server says it actually did"
  ui_state:
    run: 'node ../../bin/proofloop-browser.mjs http://localhost:3000/ --screenshot .proofloop/runs/{run_id}/ui.png'
    note: "what the user actually SEES: text truth on stdout, pixel truth in ui.png (needs npm i playwright-core + system Chrome)"

cleanup:
  - run: 'curl -s -X DELETE "localhost:3000/todos?tag={tag}"'
  - verify: "curl -s localhost:3000/todos"
